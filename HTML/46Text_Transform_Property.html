<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Transform Property</title>
    <style>
        #upper {
            text-transform: uppercase;
        }
        #none {
            text-transform: none;
        }
        #lower {
            text-transform: lowercase;
        }
        #capital {
            text-transform: capitalize;
        }
    </style>
</head>
<body>
    <h1 id="upper">Hello Everyone!</h1>
    <p id="none">I am Ritika Rathore.</p>
    <p id="lower">I am learning CSS.</p>
    <p id="capital">What about you guys?</p>
</body>
</html>
