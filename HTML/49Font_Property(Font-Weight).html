<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Property: Font-Weight</title>
    <style>
        *{
            font-size: 20px;
        }
        #a {
            font-weight: 100;
        }
        #b {
            font-weight: 300;
        }
        #c {
            font-weight: 500;
        }
        #d {
            font-weight: 700;
        }
        #e {
            font-weight: 900;
        }
    </style>
</head>
<body>
    <p id="a">Lorem ipsum dolor sit amet.</p>
    <p id="b">Lorem ipsum dolor sit amet.</p>
    <p id="c">Lorem ipsum dolor sit amet.</p>
    <p id="d">Lorem ipsum dolor sit amet.</p>
    <p id="e">Lorem ipsum dolor sit amet.</p>
</body>
</html>
