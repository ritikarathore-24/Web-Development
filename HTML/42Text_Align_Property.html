<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Align Property</title>
    <style>
        .box{
            height: 100px;
            width: 200px;
        }
        #box1 {
            background-color: #77d9b385;
            text-align: left;
        }
        #box2 {
            background-color: #90d6eb85;
            text-align: center;
        }
        #box3 {
           background-color: #de91c785;
           text-align: right;
        }
    </style>
</head>
<body>
    <div id="box1" class="box">Box 1</div> <br>
    <div id="box2" class="box">Box 2</div> <br>
    <div id="box3" class="box">Box 3</div> <br>
</body>
</html>
