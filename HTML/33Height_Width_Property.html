<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Height And Width Property</title>
    <style>
        #first {
            background-color: palevioletred;
        }
        #second {
            background-color: plum;
        }
        #third {
            background-color: skyblue;
        }
        .box {
            height: 100px;
            width: 100px;
        }
    </style>
</head>
<body>
    <div id="first" class="box">BOX 1</div> <br>
    <div id="second"class="box">BOX 2</div> <br>
    <div id="third"class="box">BOX 3</div> <br>
</body>
</html>
