<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model: Box Sizing Property</title>
    <style>
        h1 {
            color :maroon;
            text-align: center;
            text-decoration: underline;
            text-decoration-style: wavy;
        }
        .box {
            height: 100px;
            width: 100px;
            margin: 50px;
            padding: 10px;
            border: 3px solid black;
            border-radius: 30px;
            text-align: center;
        }
        #box1 {
            background-color: rgb(76, 76, 159);
            box-sizing: border-box;
        }
        #box2 {
            background-color: rgb(166, 188, 207);
            box-sizing: content-box;
        }
    </style>
</head>
<body>
    <h1>Box Sizing</h1>
    <div id="box1" class="box">Box 1</div>
    <div id="box2" class="box">Box 2</div>
</body>
</html>
