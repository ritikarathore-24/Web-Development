<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Property: Font-Style</title>
    <style>
        #a {
            font-style: italic;
        }
        #b {
            font-style: oblique;
        }
        #c {
            font-style: normal;
        }
    </style>
</head>
<body>
    <p id="a">Lorem ipsum dolor sit amet.</p>
    <p id="b">Lorem ipsum dolor sit amet.</p>
    <p id="c">Lorem ipsum dolor sit amet.</p>
</body>
</html>
