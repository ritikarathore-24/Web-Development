<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model: Border Radius Property</title>
    <style>
        h1 {
            color: navy;
            text-align: center;
            text-decoration: underline;
            text-decoration-style: solid;
        }
        .button {
            height: 50px;
            width: 250px;
            color: maroon;
            background-color: rgba(14, 174, 123, 0.497);
            text-align: center;
            margin-top: 30px;
            margin-left: 360px;
            border: 2px solid black;
        }
        #btn1 {
            border-radius: 50px;
        }
        #btn2 {
            border-top-left-radius: 50px;
            border-bottom-left-radius: 10px;
        }
    </style>
</head>
<body>
    <h1>Border Radius</h1>
    <button id="btn1" class="button">Push Me Up!</button>
    <button id="btn2" class="button">Push Me Up!</button>
</body>
</html>
