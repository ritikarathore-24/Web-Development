<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Properties: None</title>
    <style>
        h1 {
            color: rgb(185, 33, 63);
            background-color: rgb(34, 62, 5);
            text-align: center;
        }
        .box {
            height: 100px;
            width: 100px;
            margin: 10px;
            padding: 5px;
            border: 2px solid black;
            text-align: center;
            text-decoration: underline;
            text-decoration-style: double;
        }
        .type1 {
            background-color: chocolate;
        }
        .type2 {
            background-color: rgb(105, 95, 160);
            display: none;
        }
        .type3 {
            background-color: cadetblue;
        }
        
    </style>
</head>
<body>
    <h1>Display: None Property</h1>
    <div class="box type1">Box 1</div>
    <div class="box type2">Box 2</div>
    <div class="box type3">Box 3</div>
</body>
</html>
