<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Properties: Inline-Block</title>
    <style>
        h1 {
            color:rgb(86, 160, 12);
            background-color: crimson;
            border: 1px solid black;
            text-align: center;
        }
        .box {
            height: 100px;
            width: 100px;
            margin: 10px;
            padding: 5px;
            border: 3px solid black;
            text-align: center;
            text-decoration: underline;
            text-decoration-style: dotted;
        }
        .type1 {
            background-color: cornflowerblue;
            display: block;
        } 
        .type2 {
            background-color: coral;
            display: inline-block;
        }   
    </style>
</head>
<body>
    <h1>Block Elements</h1>
    <div class="box type1">Box 1</div>
    <div class="box type1">Box 2</div>
    <div class="box type1">Box 3</div> <hr>
    <h1>Inline-Block Elements</h1>
    <div class="box type2">Box 1</div>
    <div class="box type2">Box 2</div>
    <div class="box type2">Box 3</div>
</body>
</html>
