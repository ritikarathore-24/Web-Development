<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Selector</title>
    <style>
        #me, .mine, #myself {
          color: hotpink;
        }
    </style>
</head>
<body>
    <div id="me">Me Div</div>
    <div class="mine">Mine Div</div>
    <div id="myself">Myself Div</div>
    <div class="your">Your Div</div>
</body>
</html>
