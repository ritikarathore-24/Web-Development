<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model: Margin Property</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        .div {
           height: 100px;
           width: 100px;
           color: maroon;
           text-align: center;
           padding: 10px;
        }
        #first {
            background-color: #e08611;
             margin: 10px 10px 15px 20px;
        }
        #second {
            background-color: rgb(9, 233, 166);
             margin: 20px 10px 15px 20px;
        }
    </style>
</head>
<body>
    <div id="first" class="div">Box 1</div>
    <div id="second" class="div">Box 2</div>
</body>
</html>
