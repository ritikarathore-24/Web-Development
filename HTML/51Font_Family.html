<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Font Family</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Covered+By+Your+Grace&family=Crafty+Girls&family=Fondamento:ital@0;1&family=League+Gothic&family=Meddon&display=swap"
      rel="stylesheet"
    />
    <style>
      #a {
        font-family: "League Gothic", sans-serif;
      }
      #b {
        font-family: "Fondamento", cursive;
      }
      #c {
        font-family: "Crafty Girls", cursive;
      }
    </style>
  </head>
  <body>
    <p id="a">Lorem ipsum dolor sit amet.</p>
    <p id="b">Lorem ipsum dolor sit amet.</p>
    <p id="c">Lorem ipsum dolor sit amet.</p>
  </body>
</html>
