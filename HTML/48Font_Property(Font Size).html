<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Property: Font-Size</title>
    <style>
        #a {
            font-size: 50px;
        }
        #b {
            font-size: 40px;
        }
        #c {
            font-size: 30px;
        }
        #d {
            font-size: 20px;
        }
    </style>
</head>
<body>
    <p id="a">Lorem ipsum dolor sit amet.</p>
    <p id="b">Lorem ipsum dolor sit amet.</p>
    <p id="c">Lorem ipsum dolor sit amet.</p>
    <p id="d">Lorem ipsum dolor sit amet.</p>
</body>
</html>
